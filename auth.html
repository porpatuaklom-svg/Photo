<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLOWGRAM.FOTO | สมัครสมาชิก & เข้าสู่ระบบ</title>
  <link rel="stylesheet" href="styleauth.css">
  <script type="module" src="register.js" defer></script>
  <script type="module" src="google.js" defer></script>
  <link href='https://cdn.boxicons.com/fonts/basic/boxicons.min.css' rel='stylesheet'>
<link rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='48'%3E%F0%9F%93%B7%3C/text%3E%3C/svg%3E">

</head>

<body>
  <div class="auth-container">
    <div class="register-card" style="display:none;">
      <h1>สมัครสมาชิก</h1>
      <form id="registerForm">
        <div id="signupmessage" class="messagediv" style="display: none;"></div>
        <input type="name" name="nname" placeholder="ชื่อ-นามสกุล" id="name" required />
        <input type="email" name="email" placeholder="อีเมล" id="email" required />
        <input type="password" name="password" placeholder="รหัสผ่าน" id="password" required />
        <button type="submit" id="submit">สมัครสมาชิก</button>
      </form>
      <p class="muted">มีบัญชีแล้ว? <a href="#" onclick="showLogin()">เข้าสู่ระบบ</a></p>
    </div>
    <div class="login-card">
      <i class='bx  bx-user-circle' style='color:#000000 '></i>
      <h1>เข้าสู่ระบบ</h1>
      <form id="loginForm">
        <div id="signinmessage" class="messagediv" style="display: none;"></div>
        <input type="email" name="email" placeholder="อีเมล" id="loginEmail" required />
        <input type="password" name="password" placeholder="รหัสผ่าน" id="loginPassword" required />
        <button type="submit" id="submitlogin">เข้าสู่ระบบ</button>
        <div class="social">

          <button class="go" id="google" type="button">ล็อกอินด้วย Google</button>


        </div>
      </form>
      <p class="muted">ยังไม่มีบัญชี? <a href="#" onclick="showRegister()">สมัครสมาชิก</a></p>
    </div>
  </div>
  <script>
    function showLogin() {
      document.querySelector('.register-card').style.display = 'none';
      document.querySelector('.login-card').style.display = 'block';
    }
    function showRegister() {
      document.querySelector('.login-card').style.display = 'none';
      document.querySelector('.register-card').style.display = 'block';
    }
  </script>
</body>

</html>
